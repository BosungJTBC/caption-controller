<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>JTBC 디지털 라이브 자막</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  color: #e8e8e8;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0d1117;
  overflow: hidden;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 30%, #0d3d4488 0%, transparent 60%),
    radial-gradient(ellipse 70% 70% at 80% 70%, #1a1a5588 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 55% 20%, #0a2a3a66 0%, transparent 55%);
  animation: blobMove 10s ease-in-out infinite alternate;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 50% 40% at 75% 40%, #1e3a5f44 0%, transparent 55%),
    radial-gradient(ellipse 60% 50% at 25% 75%, #0e3a3a44 0%, transparent 55%);
  animation: blobMove2 14s ease-in-out infinite alternate;
  z-index: 0;
}
@keyframes blobMove {
  0%   { transform: translate(0px, 0px) scale(1); }
  33%  { transform: translate(30px, -20px) scale(1.05); }
  66%  { transform: translate(-20px, 30px) scale(0.97); }
  100% { transform: translate(10px, -10px) scale(1.03); }
}
@keyframes blobMove2 {
  0%   { transform: translate(0px, 0px) scale(1); }
  33%  { transform: translate(-25px, 20px) scale(1.04); }
  66%  { transform: translate(20px, -25px) scale(0.98); }
  100% { transform: translate(-10px, 15px) scale(1.02); }
}
@keyframes gradPulse {
  from { opacity: 0.7; }
  to   { opacity: 1; }
}
.wrap { width: 100%; max-width: 420px; padding: 24px; position: relative; z-index: 1; }
.logo { text-align: center; margin-bottom: 36px; }
.logo .brand { font-size: 13px; font-weight: 700; color: #e8001e; letter-spacing: 0.15em; margin-bottom: 8px; }
.logo h1 { font-size: 22px; font-weight: 500; color: #fff; }
.logo p { font-size: 12px; color: #555; margin-top: 6px; }
.card { background: #1a1a22cc; backdrop-filter: blur(12px); border: 0.5px solid #2a2a38; border-radius: 16px; padding: 32px; }
.tabs { display: flex; background: #12121a; border-radius: 8px; padding: 3px; margin-bottom: 28px; }
.tab { flex: 1; padding: 8px; text-align: center; font-size: 13px; color: #666; cursor: pointer; border-radius: 6px; border: none; background: none; font-family: inherit; transition: all 0.15s; }
.tab.active { background: #2a2a3a; color: #fff; }
.form-group { margin-bottom: 14px; }
.form-label { font-size: 11px; color: #777; margin-bottom: 6px; display: block; }
.form-input { width: 100%; background: #12121a; border: 0.5px solid #2a2a38; border-radius: 8px; color: #e8e8e8; padding: 11px 14px; font-size: 13px; font-family: inherit; outline: none; transition: border-color 0.15s; }
.form-input:focus { border-color: #e8001e; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.btn { width: 100%; padding: 13px; border-radius: 10px; border: none; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; transition: all 0.15s; margin-top: 6px; }
.btn-red { background: #e8001e; color: #fff; }
.btn-red:hover { background: #ff1a35; }
.msg { font-size: 12px; margin-top: 10px; text-align: center; min-height: 18px; }
.msg.err { color: #ff8888; }
.msg.ok { color: #88ff99; }
.notice-box { background: #1a121099; border: 0.5px solid #e8001e44; border-left: 3px solid #e8001e; border-radius: 8px; padding: 12px 16px; margin-top: 16px; max-height: 160px; overflow-y: auto; word-break: break-word; }
.notice-title { font-size: 11px; font-weight: 700; color: #e8001e; letter-spacing: 0.08em; margin-bottom: 6px; }
.notice-text { font-size: 13px; color: #ccc; line-height: 1.6; white-space: pre-wrap; overflow-wrap: break-word; word-break: break-word; }
.notice-text a { color: #88aaff; text-decoration: underline; }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="brand">JTBC</div>
    <h1>디지털 라이브 자막</h1>
    <p>Digital Live Caption System</p>
  </div>
  <div class="card">
    <div class="tabs">
      <button class="tab active" id="tabLogin" onclick="showTab('login')">로그인</button>
      <button class="tab" id="tabSignup" onclick="showTab('signup')">회원가입</button>
    </div>
    <div id="loginForm">
      <div class="form-group">
        <label class="form-label">이메일</label>
        <input type="email" class="form-input" id="loginEmail" placeholder="이메일 입력">
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호</label>
        <input type="password" class="form-input" id="loginPw" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')login()">
      </div>
      <div class="msg err" id="loginMsg"></div>
      <button class="btn btn-red" onclick="login()">로그인</button>
    </div>
    <div id="signupForm" style="display:none">
      <div class="form-group">
        <label class="form-label">이메일</label>
        <input type="email" class="form-input" id="signupEmail" placeholder="이메일 입력">
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호</label>
        <input type="password" class="form-input" id="signupPw" placeholder="8자 이상">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">이름</label>
          <input type="text" class="form-input" id="signupName" placeholder="홍길동">
        </div>
        <div class="form-group">
          <label class="form-label">부서</label>
          <input type="text" class="form-input" id="signupDept" placeholder="디지털뉴스팀">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">전화번호</label>
        <input type="tel" class="form-input" id="signupPhone" placeholder="010-0000-0000" onkeydown="if(event.key==='Enter')signup()">
      </div>
      <div class="msg err" id="signupErr"></div>
      <div class="msg ok" id="signupOk"></div>
      <button class="btn btn-red" onclick="signup()">가입하기</button>
    </div>
  </div>
  <div id="noticeArea" style="margin-top:16px"></div>
</div>
<script>
const SB = supabase.createClient(
  'https://mtkppcexpubazjeceyvj.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im10a3BwY2V4cHViYXpqZWNleXZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NjA5NDIsImV4cCI6MjA5MjIzNjk0Mn0.3ruVRo3JIWUipK5-as9kTzYjRZa32K_TX1X_vSqi_v4'
);
SB.auth.getSession().then(({ data }) => { if (data.session) location.href = 'controller.html'; });

// 공지 불러오기
SB.from('notices').select('*').eq('is_active', true).limit(1).single().then(({ data }) => {
  if (!data || !data.content) return;
  function linkify(text) {
    const escaped = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return escaped.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');
  }
  document.getElementById('noticeArea').innerHTML = `
    <div class="notice-box">
      <div class="notice-title">📢 공지사항</div>
      <div class="notice-text">${linkify(data.content)}</div>
    </div>`;
});

function showTab(t) {
  document.getElementById('loginForm').style.display = t === 'login' ? 'block' : 'none';
  document.getElementById('signupForm').style.display = t === 'signup' ? 'block' : 'none';
  document.getElementById('tabLogin').classList.toggle('active', t === 'login');
  document.getElementById('tabSignup').classList.toggle('active', t === 'signup');
}
async function login() {
  const email = document.getElementById('loginEmail').value.trim();
  const pw = document.getElementById('loginPw').value;
  const msg = document.getElementById('loginMsg');
  msg.textContent = '';
  if (!email || !pw) { msg.textContent = '이메일과 비밀번호를 입력해주세요.'; return; }
  const { error } = await SB.auth.signInWithPassword({ email, password: pw });
  if (error) { msg.textContent = '이메일 또는 비밀번호가 올바르지 않습니다.'; return; }
  // 승인 여부 확인
  const { data: { session } } = await SB.auth.getSession();
  const { data: profile } = await SB.from('profiles').select('is_approved').eq('id', session.user.id).single();
  if (!profile?.is_approved) {
    await SB.auth.signOut();
    msg.textContent = '관리자 승인 대기 중입니다. 승인 후 로그인해주세요.';
    return;
  }
  location.href = 'controller.html';
}
async function signup() {
  const email = document.getElementById('signupEmail').value.trim();
  const pw = document.getElementById('signupPw').value;
  const name = document.getElementById('signupName').value.trim();
  const dept = document.getElementById('signupDept').value.trim();
  const phone = document.getElementById('signupPhone').value.trim();
  const err = document.getElementById('signupErr');
  const ok = document.getElementById('signupOk');
  err.textContent = ''; ok.textContent = '';
  if (!email || !pw || !name || !dept) { err.textContent = '모든 항목을 입력해주세요.'; return; }
  if (pw.length < 8) { err.textContent = '비밀번호는 8자 이상이어야 합니다.'; return; }
  const { data, error } = await SB.auth.signUp({ email, password: pw, options: { data: { name, department: dept, phone } } });
  if (error) { err.textContent = error.message; return; }
  if (data.user) {
    await SB.from('profiles').upsert({
      id: data.user.id,
      name,
      department: dept,
      phone,
      is_admin: false,
      is_approved: false
    }, { onConflict: 'id' });
  }
  ok.textContent = '가입 완료! 관리자 승인 후 로그인 가능합니다.';
  setTimeout(() => showTab('login'), 3000);
}
</script>
</body>
</html>
