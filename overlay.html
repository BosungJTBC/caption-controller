<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>JTBC 자막 오버레이</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; }
#stage { position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: center; align-items: flex-end; padding: 32px 40px; pointer-events: none; }
#caption-wrap { position: relative; transition: transform 0.3s ease; }
#caption-bar { display: flex; align-items: stretch; overflow: hidden; opacity: 0; transform: translateY(20px); transition: opacity 0.4s ease, transform 0.4s ease; }
#caption-bar.visible { opacity: 1; transform: translateY(0); }
#caption-bar.no-anim { transition: none !important; }
#label-block { display: flex; align-items: center; white-space: nowrap; font-weight: 700; flex-shrink: 0; }
#text-block { display: flex; align-items: center; flex: 1; }
</style>
</head>
<body>
<div id="stage">
  <div id="caption-wrap">
    <div id="caption-bar">
      <div id="text-block"></div>
    </div>
  </div>
</div>
<script>
const SUPABASE_URL = 'https://mtkppcexpubazjeceyvj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im10a3BwY2V4cHViYXpqZWNleXZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NjA5NDIsImV4cCI6MjA5MjIzNjk0Mn0.3ruVRo3JIWUipK5-as9kTzYjRZa32K_TX1X_vSqi_v4';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const uid = new URLSearchParams(location.search).get('uid');
let lastText = null, lastStyleId = null;
let customFontsLoaded = {};

function hexToRgba(hex, alpha) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${(alpha/100).toFixed(2)})`;
}

function loadCustomFont(preset) {
  if (!preset.customFont || customFontsLoaded[preset.id]) return;
  const style = document.createElement('style');
  const ff = 'CF_' + preset.id;
  style.textContent = `@font-face{font-family:'${ff}';src:url('${preset.customFont}');}`;
  document.head.appendChild(style);
  customFontsLoaded[preset.id] = ff;
}

function applyPreset(p, bar, textEl) {
  const vw = window.innerWidth || 1920;
  const scale = vw / 1920;
  bar.style.width = ((p.width||1920)*scale)+'px';
  bar.style.height = ((p.height||60)*scale)+'px';
  bar.style.border = p.borderWidth>0?`${p.borderWidth}px solid ${p.borderColor}`:'none';
  bar.style.borderRadius = '4px';
  if (p.bgImage) { bar.style.backgroundImage=`url(${p.bgImage})`;bar.style.backgroundSize='cover';bar.style.backgroundPosition='center'; }
  else bar.style.backgroundImage='none';
  loadCustomFont(p);
  const ff=customFontsLoaded[p.id]?`'${customFontsLoaded[p.id]}',${p.font}`:p.font;
  textEl.style.background=p.bgImage?'transparent':hexToRgba(p.textBg,p.textBgAlpha);
  textEl.style.color=p.textColor;
  textEl.style.fontSize=Math.round(p.fontSize*scale)+'px';
  textEl.style.fontFamily=ff;
  textEl.style.fontWeight=p.fontWeight;
  textEl.style.textAlign=p.textAlign||'left';
  textEl.style.paddingLeft=Math.round((p.paddingLeft??24)*scale)+'px';
  textEl.style.paddingRight=Math.round(24*scale)+'px';
  textEl.style.textShadow='0 1px 4px rgba(0,0,0,0.3)';
}

function applyState(data) {
  const bar=document.getElementById('caption-bar');
  const textEl=document.getElementById('text-block');
  const wrap=document.getElementById('caption-wrap');
  const pos=data.pos||{x:0,y:0};
  wrap.style.transform=`translate(${pos.x||0}px,${pos.y||0}px)`;
  data.anim!==false?bar.classList.remove('no-anim'):bar.classList.add('no-anim');
  const idx=data.active_index;
  const captions=data.captions||[];
  const cap=(idx>=0&&captions[idx])?captions[idx]:null;
  const newText=cap?cap.text:null;
  const newStyleId=cap?cap.styleId:null;
  if(newText!==lastText||newStyleId!==lastStyleId){
    if(newText&&cap){
      const preset=(data.presets||[]).find(p=>p.id===cap.styleId)||(data.presets||[])[0];
      if(lastText&&data.anim!==false){
        bar.classList.remove('visible');
        setTimeout(()=>{
          if(preset)applyPreset(preset,bar,textEl);
          textEl.textContent=newText;
          lastText=newText;lastStyleId=newStyleId;
          bar.classList.add('visible');
        },420);
      } else {
        if(preset)applyPreset(preset,bar,textEl);
        textEl.textContent=newText;
        lastText=newText;lastStyleId=newStyleId;
        bar.classList.add('visible');
      }
    } else {
      bar.classList.remove('visible');
      lastText=newText;lastStyleId=newStyleId;
    }
  }
}

async function init() {
  if (!uid) { console.error('uid 없음'); return; }
  const { data } = await sb.from('caption_state').select('*').eq('id', uid).single();
  if (data) applyState(data);
  sb.channel('overlay_'+uid)
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'caption_state',filter:`id=eq.${uid}`},payload=>applyState(payload.new))
    .subscribe();
}

init();
</script>
</body>
</html>
