<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>JTBC 디지털 라이브 자막 - 관리자</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Apple SD Gothic Neo','Malgun Gothic',sans-serif; background: #0a0a0f; color: #e8e8e8; min-height: 100vh; }
.topbar { height: 52px; background: #1a1a22; border-bottom: 0.5px solid #2a2a38; padding: 0 24px; display: flex; align-items: center; gap: 12px; }
.brand { font-size: 11px; font-weight: 700; color: #e8001e; letter-spacing: 0.12em; }
.topbar-title { font-size: 14px; font-weight: 500; color: #fff; }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.ghost { background: none; border: none; color: #666; font-size: 11px; cursor: pointer; font-family: inherit; padding: 4px 8px; border-radius: 6px; transition: all 0.15s; }
.ghost:hover { color: #aaa; background: #2a2a38; }
.wrap { max-width: 700px; margin: 40px auto; padding: 0 24px; }
.card { background: #1a1a22; border: 0.5px solid #2a2a38; border-radius: 14px; padding: 28px; margin-bottom: 20px; }
.card-title { font-size: 14px; font-weight: 500; color: #fff; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.card-title .badge { font-size: 10px; padding: 2px 8px; border-radius: 4px; background: #e8001e22; color: #ff8899; border: 0.5px solid #e8001e44; }
.form-label { font-size: 11px; color: #777; margin-bottom: 6px; display: block; }
textarea.fi { width: 100%; background: #12121a; border: 0.5px solid #2a2a38; border-radius: 8px; color: #e8e8e8; padding: 12px 14px; font-size: 13px; font-family: inherit; resize: vertical; min-height: 120px; outline: none; transition: border-color 0.15s; line-height: 1.6; }
textarea.fi:focus { border-color: #e8001e; }
.row { display: flex; gap: 10px; align-items: center; margin-top: 12px; }
.btn { border: none; border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; padding: 9px 16px; transition: all 0.15s; font-family: inherit; }
.btn-red { background: #e8001e; color: #fff; }
.btn-red:hover { background: #ff1a35; }
.btn-gray { background: #2a2a38; color: #aaa; border: 0.5px solid #3a3a4a; }
.btn-gray:hover { background: #33334a; color: #ddd; }
.toggle-row { display: flex; align-items: center; gap: 10px; }
.toggle-label { font-size: 13px; color: #ccc; }
.toggle { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; inset: 0; background: #2a2a38; border-radius: 11px; cursor: pointer; transition: 0.2s; }
.toggle-slider:before { content: ''; position: absolute; width: 16px; height: 16px; left: 3px; top: 3px; background: #666; border-radius: 50%; transition: 0.2s; }
.toggle input:checked + .toggle-slider { background: #e8001e44; }
.toggle input:checked + .toggle-slider:before { transform: translateX(18px); background: #e8001e; }
.status-msg { font-size: 12px; margin-top: 10px; min-height: 18px; }
.ok { color: #88ff99; }
.err { color: #ff8888; }
.preview-box { background: #12121a; border: 0.5px solid #2a2a38; border-radius: 8px; padding: 14px 16px; margin-top: 12px; }
.preview-label { font-size: 11px; color: #555; margin-bottom: 6px; }
.preview-content { font-size: 13px; color: #ccc; line-height: 1.6; white-space: pre-wrap; }
.sep { height: 0.5px; background: #2a2a38; margin: 16px 0; }
.users-table { width: 100%; border-collapse: collapse; }
.users-table th { font-size: 11px; color: #555; text-align: left; padding: 8px 10px; border-bottom: 0.5px solid #2a2a38; }
.users-table td { font-size: 13px; color: #ccc; padding: 10px 10px; border-bottom: 0.5px solid #1a1a22; }
.users-table tr:last-child td { border-bottom: none; }
.admin-badge { font-size: 10px; padding: 2px 7px; border-radius: 4px; background: #e8001e22; color: #ff8899; border: 0.5px solid #e8001e44; }
</style>
</head>
<body>

<div class="topbar">
  <span class="brand">JTBC</span>
  <span class="topbar-title">관리자 페이지</span>
  <div class="topbar-right">
    <a href="controller.html" class="ghost">컨트롤러로 이동</a>
    <button class="ghost" onclick="logout()">로그아웃</button>
  </div>
</div>

<div class="wrap">

  <!-- 공지 관리 -->
  <div class="card">
    <div class="card-title">
      공지 관리
      <span class="badge" id="activeLabel">비활성</span>
    </div>
    <div class="toggle-row" style="margin-bottom:16px">
      <label class="toggle"><input type="checkbox" id="noticeActive" onchange="saveNotice()"><span class="toggle-slider"></span></label>
      <span class="toggle-label">로그인 페이지에 공지 표시</span>
    </div>
    <label class="form-label">공지 내용</label>
    <textarea class="fi" id="noticeContent" placeholder="로그인 페이지에 표시될 공지를 입력하세요.&#10;예) 오늘 오후 2시 서버 점검이 있을 예정입니다."></textarea>
    <div class="row">
      <button class="btn btn-red" onclick="saveNotice()">저장</button>
      <button class="btn btn-gray" onclick="clearNotice()">공지 삭제</button>
      <span class="status-msg" id="noticeMsg"></span>
    </div>
    <div class="sep"></div>
    <div class="preview-label">미리보기</div>
    <div class="preview-box">
      <div class="preview-content" id="noticePreview">공지 내용이 여기에 표시됩니다.</div>
    </div>
  </div>

  <!-- 사용자 목록 -->
  <div class="card">
    <div class="card-title">사용자 목록</div>
    <table class="users-table">
      <thead>
        <tr>
          <th>이름</th>
          <th>부서</th>
          <th>전화</th>
          <th>상태</th>
          <th>관리</th>
        </tr>
      </thead>
      <tbody id="userList">
        <tr><td colspan="5" style="color:#444;text-align:center;padding:20px">불러오는 중...</td></tr>
      </tbody>
    </table>
  </div>

</div>

<script>
const SB = supabase.createClient(
  'https://mtkppcexpubazjeceyvj.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im10a3BwY2V4cHViYXpqZWNleXZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NjA5NDIsImV4cCI6MjA5MjIzNjk0Mn0.3ruVRo3JIWUipK5-as9kTzYjRZa32K_TX1X_vSqi_v4'
);

async function init() {
  const { data: { session } } = await SB.auth.getSession();
  if (!session) { location.href = 'index.html'; return; }
  const { data: profile } = await SB.from('profiles').select('*').eq('id', session.user.id).single();
  if (!profile?.is_admin) { alert('관리자 권한이 없습니다.'); location.href = 'controller.html'; return; }
  loadNotice();
  loadUsers();
}

let noticeId = null;

async function loadNotice() {
  const { data } = await SB.from('notices').select('*').order('id').limit(1).single();
  if (!data) return;
  noticeId = data.id;
  document.getElementById('noticeContent').value = data.content || '';
  document.getElementById('noticeActive').checked = !!data.is_active;
  updateActiveLabel(!!data.is_active);
  updatePreview(data.content || '');
}

async function saveNotice() {
  const content = document.getElementById('noticeContent').value.trim();
  const is_active = document.getElementById('noticeActive').checked;
  const msg = document.getElementById('noticeMsg');
  const { error } = await SB.from('notices').update({ content, is_active, updated_at: new Date().toISOString() }).eq('id', noticeId);
  if (error) { msg.className = 'status-msg err'; msg.textContent = '저장 실패'; return; }
  msg.className = 'status-msg ok'; msg.textContent = '저장됐습니다.';
  setTimeout(() => msg.textContent = '', 2000);
  updateActiveLabel(is_active);
  updatePreview(content);
}

async function clearNotice() {
  if (!confirm('공지를 삭제하고 비활성화할까요?')) return;
  document.getElementById('noticeContent').value = '';
  document.getElementById('noticeActive').checked = false;
  await SB.from('notices').update({ content: '', is_active: false, updated_at: new Date().toISOString() }).eq('id', noticeId);
  updateActiveLabel(false);
  updatePreview('');
  document.getElementById('noticeMsg').className = 'status-msg ok';
  document.getElementById('noticeMsg').textContent = '삭제됐습니다.';
  setTimeout(() => document.getElementById('noticeMsg').textContent = '', 2000);
}

function updateActiveLabel(active) {
  const el = document.getElementById('activeLabel');
  el.textContent = active ? '활성' : '비활성';
  el.style.background = active ? '#00aa4422' : '#e8001e22';
  el.style.color = active ? '#88ffaa' : '#ff8899';
  el.style.borderColor = active ? '#00aa4444' : '#e8001e44';
}

function updatePreview(content) {
  document.getElementById('noticePreview').textContent = content || '공지 내용이 여기에 표시됩니다.';
  document.getElementById('noticePreview').style.color = content ? '#ccc' : '#444';
}

document.getElementById('noticeContent').addEventListener('input', e => updatePreview(e.target.value));

async function loadUsers() {
  const { data } = await SB.from('profiles').select('*').order('is_approved').order('name');
  const tbody = document.getElementById('userList');
  if (!data || !data.length) { tbody.innerHTML = '<tr><td colspan="5" style="color:#444;text-align:center;padding:20px">사용자 없음</td></tr>'; return; }
  tbody.innerHTML = data.map(u => `
    <tr>
      <td>
        ${u.name || '-'}
        ${u.is_admin ? '<span class="admin-badge" style="margin-left:6px">관리자</span>' : ''}
      </td>
      <td>${u.department || '-'}</td>
      <td style="font-size:11px;color:#888">${u.phone || '-'}</td>
      <td>
        ${u.is_approved
          ? '<span style="font-size:11px;color:#88ffaa">승인됨</span>'
          : '<span style="font-size:11px;color:#ff8888">대기 중</span>'}
      </td>
      <td>
        ${u.is_approved
          ? `<button class="btn btn-gray" style="padding:4px 10px;font-size:11px" onclick="setApproval('${u.id}', false)">승인 취소</button>`
          : `<button class="btn btn-red" style="padding:4px 10px;font-size:11px" onclick="setApproval('${u.id}', true)">승인</button>`}
      </td>
    </tr>`).join('');
}

async function setApproval(id, approved) {
  const action = approved ? '승인' : '승인을 취소';
  if (!confirm(`이 사용자의 ${action}할까요?`)) return;
  const { error } = await SB.from('profiles').update({ is_approved: approved }).eq('id', id);
  if (error) { alert('처리 실패: ' + error.message); return; }
  loadUsers();
}

async function logout() { await SB.auth.signOut(); location.href = 'index.html'; }

init();
</script>
</body>
</html>
